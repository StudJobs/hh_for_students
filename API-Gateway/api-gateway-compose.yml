version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "8000:8000"
      - "9091:9091"

    environment:
      METRICS_ADDR: ":9091"

    volumes:
      - ./configs:/configs
    networks:  # ← ДОБАВЬТЕ ЭТОТ БЛОК
      - microservices-net


networks:
  microservices-net:
    external: true 