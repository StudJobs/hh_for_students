version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "8000:8000"
      - "9091:9091"

    environment:
      METRICS_ADDR: ":9091"
      REDIS_ADDR: "redis:6379"
      RATELIMIT_PER_MIN: "600"
      RATELIMIT_BURST: "100"
      # Internal endpoint MinIO для PUT-flow аватара/резюме.
      # Presigned URL подписан под публичный host (localhost:9000), но Gateway
      # из контейнера не может ходить на localhost — подменяет host на internal,
      # сохраняя Host header публичным для AWS Sig V4 валидации.
      MINIO_INTERNAL_ENDPOINT: "minio:9000"

    volumes:
      - ./configs:/configs
    networks:
      - microservices-net


networks:
  microservices-net:
    external: true 