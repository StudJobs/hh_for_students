services:
  achieve:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "50053:50053"
      - "9094:9094"

    depends_on:
      postgres_achieve:
        condition: service_healthy

    environment:
      DB_PASS: ${DB_PASS}
      DB_HOST: postgres_achieve
      DB_PORT: 5432
      DB_USER: postgres
      DB_NAME: S3
      DB_SSLMODE: disable
      MINIO_ENDPOINT: minio:9000
      # Host[:port] для подмены в download-presigned-URL.
      # Браузер не резолвит docker-DNS `minio`, поэтому отдаём localhost:9000
      # (MinIO игнорирует host в подписи URL, проверяя только Host header).
      MINIO_PUBLIC_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: false
      MINIO_BUCKET: achievements
      METRICS_ADDR: ":9094"

    volumes:
      - ./configs:/configs

    networks:
      - microservices-net

  postgres_achieve:
    image: postgres:15-alpine

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: S3

    ports:
      - "5437:5432"

    volumes:
      - postgres_data_achieve:/var/lib/postgresql/data

    networks:
      - microservices-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d S3"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_achieve:

networks:
  microservices-net:
    external: true 